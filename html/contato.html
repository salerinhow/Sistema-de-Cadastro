  <section class="pagina">
    <h2>Entre em Contato com a TechConnect</h2>

    <form>
         <label for="nome">Nome</label>
            <input type="text" id="nome" required>
              <label for="email">Email</label>
                 <input type="email" id="email" required>
                    <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" required>
                             <label for="servico">Tipo de serviço</label>
                                     <select id="servico" required>
                                             <option value="">Selecione</option>
                                                     <option>Criação de site</option>
                                                     <option>Aplicativo</option>
                                                 <option>Criação de jogos   </option>
                                          <option>Suporte técnico</option>
                                      </select>
                                 <label for="mensagem">Mensagem</label>
                             <textarea id="mensagem" required></textarea>
                          <div class="checkbox">
                        <input type="checkbox" id="aceite" required>
                      <label for="aceite">Aceito de Termos</label>
                     </div>
                 <button type="submit">Enviar</button>
             </form>
